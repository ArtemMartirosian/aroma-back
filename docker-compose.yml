services:
  postgres:
    image: postgres:16-alpine
    container_name: aroma-perfume-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aroma_perfume
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
    container_name: aroma-perfume-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: aroma_perfume
      DB_MIGRATIONS_RUN: "true"
      JWT_SECRET: local-development-secret-change-before-production
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@aroma.local
      ADMIN_PASSWORD: admin12345
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
